<section class="testimonials section" id="testimonials">
  <div class="container">
    <div class="section__header" appScrollReveal>
      <span class="section__badge">Testimonials</span>
      <h2 class="section__title">What Clients <span class="text-gold">Say</span></h2>
      <p class="section__desc">Hear from clients who have experienced the magic of MC Adarkwah at their events.</p>
    </div>

    <div class="testimonials__carousel" appScrollReveal>
      <button class="testimonials__nav testimonials__nav--prev" (click)="prev()" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <div class="testimonials__track">
        <div class="testimonials__slide" *ngFor="let testimonial of testimonials; let i = index"
          [class.testimonials__slide--active]="i === currentIndex">
          <div class="testimonials__card">
            <div class="testimonials__stars">
              <span class="testimonials__star" *ngFor="let _ of getStars(testimonial.rating)">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              </span>
            </div>
            <p class="testimonials__review">"{{ testimonial.review }}"</p>
            <div class="testimonials__author">
              <div class="testimonials__avatar">
                <div class="testimonials__avatar-placeholder">
                  {{ testimonial.name.charAt(0) }}
                </div>
              </div>
              <div class="testimonials__info">
                <h4>{{ testimonial.name }}</h4>
                <span class="testimonials__event">{{ testimonial.eventName }}</span>
                <span *ngIf="testimonial.designation" class="testimonials__designation">{{ testimonial.designation }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="testimonials__nav testimonials__nav--next" (click)="next()" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="testimonials__dots">
      <button class="testimonials__dot" *ngFor="let t of testimonials; let i = index"
        [class.testimonials__dot--active]="i === currentIndex"
        (click)="goTo(i)" [attr.aria-label]="'Go to testimonial ' + (i + 1)"></button>
    </div>
  </div>
</section>
