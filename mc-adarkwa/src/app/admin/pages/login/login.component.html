<div class="login">
  <div class="login__overlay"></div>
  <div class="login__card">
    <div class="login__brand">
      <span class="login__logo-icon">✦</span>
      <h1 class="login__title">MC Adarkwah</h1>
      <p class="login__subtitle">Admin Dashboard</p>
    </div>
    <form class="login__form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="login__field">
        <label class="login__label" for="email">Email</label>
        <input
          id="email"
          class="login__input"
          type="email"
          placeholder="admin@example.com"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required
        />
      </div>
      <div class="login__field">
        <label class="login__label" for="password">Password</label>
        <input
          id="password"
          class="login__input"
          type="password"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          required
        />
      </div>
      <div class="login__error" *ngIf="error">
        {{ error }}
      </div>
      <button
        class="login__btn"
        type="submit"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading">
          <span class="login__spinner"></span>
          Logging in...
        </span>
      </button>
    </form>
  </div>
</div>
