<div class="layout">
  <app-sidebar></app-sidebar>
  <div class="layout__main">
    <app-topbar pageTitle="Profile / About"></app-topbar>
    <div class="content">
      <div class="toolbar">
        <button class="btn btn--gold btn--sm" (click)="save()">Save Changes</button>
      </div>
      <div class="card" style="padding:1.5rem;margin-top:1rem;">
        <div class="form">
          <div class="form__row">
            <div class="form__group">
              <label class="form__label">Name</label>
              <input class="form__input" type="text" [(ngModel)]="form.name" />
            </div>
            <div class="form__group">
              <label class="form__label">Title</label>
              <input class="form__input" type="text" [(ngModel)]="form.title" />
            </div>
          </div>
          <div class="form__group">
            <label class="form__label">Short Bio</label>
            <textarea class="form__textarea" rows="3" [(ngModel)]="form.bio"></textarea>
          </div>
          <div class="form__group">
            <label class="form__label">Full Bio</label>
            <textarea class="form__textarea" rows="5" [(ngModel)]="form.fullBio"></textarea>
          </div>
          <div class="form__row">
            <div class="form__group">
              <label class="form__label">Profile Image</label>
              <div class="upload-area" (click)="imageInput.click()">
                <img *ngIf="form.image" [src]="form.image" class="upload-preview" />
                <div *ngIf="!form.image" class="upload-placeholder">Click to upload</div>
                <input #imageInput type="file" accept="image/*" (change)="onFileSelected($event,'image')" hidden />
              </div>
            </div>
            <div class="form__group">
              <label class="form__label">Secondary Image</label>
              <div class="upload-area" (click)="image2Input.click()">
                <img *ngIf="form.image2" [src]="form.image2" class="upload-preview" />
                <div *ngIf="!form.image2" class="upload-placeholder">Click to upload</div>
                <input #image2Input type="file" accept="image/*" (change)="onFileSelected($event,'image2')" hidden />
              </div>
            </div>
          </div>
          <div class="form__group">
            <label class="form__label">Years Experience</label>
            <input class="form__input" type="number" [(ngModel)]="form.yearsExperience" />
          </div>
          <div class="form__group">
            <label class="form__label">Achievements (one per line)</label>
            <textarea class="form__textarea" rows="4" [(ngModel)]="achievementsText"></textarea>
          </div>
          <div class="form__group">
            <label class="form__label">Milestones (year|title|description per line)</label>
            <textarea class="form__textarea" rows="5" [(ngModel)]="milestonesText" placeholder="e.g. 2014|First Event|Hosted first corporate event"></textarea>
          </div>
          <h3 style="color:#d4a84b;margin:1.5rem 0 1rem;">Social Media</h3>
          <div class="form__row">
            <div class="form__group"><label class="form__label">Instagram</label><input class="form__input" type="text" [(ngModel)]="form.socialMedia['instagram']" /></div>
            <div class="form__group"><label class="form__label">Twitter</label><input class="form__input" type="text" [(ngModel)]="form.socialMedia['twitter']" /></div>
          </div>
          <div class="form__row">
            <div class="form__group"><label class="form__label">Facebook</label><input class="form__input" type="text" [(ngModel)]="form.socialMedia['facebook']" /></div>
            <div class="form__group"><label class="form__label">YouTube</label><input class="form__input" type="text" [(ngModel)]="form.socialMedia['youtube']" /></div>
          </div>
          <div class="form__row">
            <div class="form__group"><label class="form__label">LinkedIn</label><input class="form__input" type="text" [(ngModel)]="form.socialMedia['linkedin']" /></div>
            <div class="form__group"><label class="form__label">TikTok</label><input class="form__input" type="text" [(ngModel)]="form.socialMedia['tiktok']" /></div>
          </div>
          <h3 style="color:#d4a84b;margin:1.5rem 0 1rem;">Contact Info</h3>
          <div class="form__row">
            <div class="form__group"><label class="form__label">Phone</label><input class="form__input" type="text" [(ngModel)]="form.contact['phone']" /></div>
            <div class="form__group"><label class="form__label">Phone 2</label><input class="form__input" type="text" [(ngModel)]="form.contact['phone2']" /></div>
          </div>
          <div class="form__row">
            <div class="form__group"><label class="form__label">WhatsApp</label><input class="form__input" type="text" [(ngModel)]="form.contact['whatsapp']" /></div>
            <div class="form__group"><label class="form__label">Email</label><input class="form__input" type="text" [(ngModel)]="form.contact['email']" /></div>
          </div>
          <div class="form__row">
            <div class="form__group"><label class="form__label">Address</label><input class="form__input" type="text" [(ngModel)]="form.contact['address']" /></div>
            <div class="form__group"><label class="form__label">Office</label><input class="form__input" type="text" [(ngModel)]="form.contact['office']" /></div>
          </div>
          <h3 style="color:#d4a84b;margin:1.5rem 0 1rem;">Currency Settings</h3>
          <div class="form__group">
            <label class="form__label">Exchange Rate (1 GHS to USD)</label>
            <input class="form__input" type="number" step="0.001" min="0" [(ngModel)]="form.exchangeRate" />
            <small style="color:rgba(255,255,255,0.4);">Used to convert GHS prices to USD on the public site. Default: 0.077</small>
          </div>
          <div class="form__group">
            <label class="form__label">Budget Ranges (min|max|label per line)</label>
            <textarea class="form__textarea" rows="5" [(ngModel)]="budgetRangesText" placeholder="e.g. 2000|5000|GHS 2,000 - 5,000"></textarea>
            <small style="color:rgba(255,255,255,0.4);">Set max=0 for unlimited (e.g. 50000|0|GHS 50,000+). USD equivalents auto-calculate from the exchange rate.</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
