<section class="sponsors section" id="sponsors">
  <div class="container">
    <div class="section__header" appScrollReveal>
      <span class="section__badge">Partners</span>
      <h2 class="section__title">Our <span class="text-gold">Partners</span></h2>
      <p class="section__desc">Trusted by leading organizations and brands across Ghana and Africa.</p>
    </div>

    <div *ngIf="loading" class="sponsors__grid" appScrollReveal>
      <div class="sponsors__item" *ngFor="let _ of [1,2,3,4,5,6]">
        <div class="skeleton" style="width:80px;height:80px;border-radius:12px;margin:0 auto 0.8rem;"></div>
        <div class="skeleton" style="width:60px;height:12px;margin:0 auto;"></div>
      </div>
    </div>

    <div class="empty-state" *ngIf="!loading && sponsors.length === 0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      <h3>No Partners Yet</h3>
      <p>Partner organizations will be listed here once added.</p>
    </div>

    <div class="sponsors__grid" appScrollReveal *ngIf="!loading && sponsors.length > 0">
      <div class="sponsors__item" *ngFor="let sponsor of sponsors">
        <div class="sponsors__logo">
          <img *ngIf="sponsor.logo; else sponsorPlaceholder" [src]="sponsor.logo" [alt]="sponsor.name" class="sponsors__img" />
          <ng-template #sponsorPlaceholder>
            <div class="sponsors__placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </div>
          </ng-template>
        </div>
        <p class="sponsors__name">{{ sponsor.name }}</p>
      </div>
    </div>
  </div>
</section>
