<section class="videos section" id="videos">
  <div class="container">
    <div class="section__header" appScrollReveal>
      <span class="section__badge">Videos</span>
      <h2 class="section__title">Event <span class="text-gold">Highlights</span></h2>
      <p class="section__desc">Watch MC Adarkwah in action at some of the most prestigious events.</p>
    </div>

    <div class="videos__grid">
      <div class="videos__card" *ngFor="let video of videos; let i = index"
        appScrollReveal [delay]="i * 150" (click)="openVideo(video)">
        <div class="videos__thumbnail">
          <img [src]="video.thumbnail" [alt]="video.title" class="videos__img"
            (error)="video.thumbnail = 'https://placehold.co/480x270/d4a84b/0a0a0a?text=Video+Highlight'" loading="lazy">
          <div class="videos__play-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          <div class="videos__overlay">
            <h4>{{ video.title }}</h4>
            <span>Watch Now</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="videos__modal" *ngIf="activeVideo" (click)="closeVideo()">
    <div class="videos__modal-content" (click)="$event.stopPropagation()">
      <button class="videos__modal-close" (click)="closeVideo()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="videos__modal-player">
        @if (activeVideoUrl) {
          <iframe
            [src]="activeVideoUrl"
            class="videos__modal-iframe"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        } @else {
          <div class="videos__modal-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        }
      </div>
      <h3>{{ activeVideo.title }}</h3>
    </div>
  </div>
</section>
