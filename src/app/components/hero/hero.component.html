<section class="hero" id="hero">
  <div class="hero__bg">
    <video class="hero__video" autoplay muted loop playsinline preload="auto">
      <source src="video/hero_vid.mp4" type="video/mp4">
    </video>
    <div class="hero__particles" id="particles"></div>
    <div class="hero__gradient"></div>
    <div class="hero__pattern"></div>
  </div>

  <div class="hero__content">
    <div class="hero__text">
      <div class="hero__badge">
        <span class="hero__badge-dot"></span>
        Top-Rated Professional MC
      </div>
      <h1 class="hero__title">
        Making Every<br/>
        <span class="text-gold text-gradient">Event Memorable</span>
      </h1>
      <p class="hero__subtitle">
        Professional Event Host | Corporate Events | Weddings | Conferences | Concerts
      </p>
      <div class="hero__actions">
        <button class="btn btn--gold" (click)="scrollTo('booking')">
          Book MC Adarkwah
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
        <button class="btn btn--outline" (click)="scrollTo('events')">
          View Events
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
      <div class="hero__social">
        <a [href]="socialMedia.instagram" target="_blank" class="hero__social-link" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        </a>
        <a [href]="socialMedia.twitter" target="_blank" class="hero__social-link" aria-label="Twitter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
        </a>
        <a [href]="socialMedia.facebook" target="_blank" class="hero__social-link" aria-label="Facebook">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
        </a>
        <a [href]="socialMedia.youtube" target="_blank" class="hero__social-link" aria-label="YouTube">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></svg>
        </a>
      </div>
    </div>
    <div class="hero__image">
      <div class="hero__image-wrapper">
        <div class="hero__image-glow"></div>
        <div class="hero__floating-card hero__floating-card--1">
          <span class="hero__card-icon">🎤</span>
          <div>
            <strong>500+</strong>
            <small>Events Hosted</small>
          </div>
        </div>
        <div class="hero__floating-card hero__floating-card--2">
          <span class="hero__card-icon">⭐</span>
          <div>
            <strong>4.9/5</strong>
            <small>Client Rating</small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="hero__scroll-indicator" (click)="scrollTo('about')">
    <span>Scroll Down</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
  </div>
</section>
