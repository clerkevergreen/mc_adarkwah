<section class="news section" id="news">
  <div class="container">
    <div class="section__header" appScrollReveal>
      <span class="section__badge">News</span>
      <h2 class="section__title">Latest <span class="text-gold">Updates</span></h2>
      <p class="section__desc">Stay informed with the latest news, announcements, and event updates from MC Adarkwah.</p>
    </div>

    <div class="news__grid">
      <div class="news__card" *ngFor="let item of newsItems; let i = index"
        appScrollReveal [delay]="i * 100">
        <div class="news__image">
          <img *ngIf="item.imageUrl; else newsPlaceholder" [src]="item.imageUrl" [alt]="item.title" class="news__img" />
          <ng-template #newsPlaceholder>
            <div class="news__placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </div>
          </ng-template>
          <span class="news__category">{{ item.category }}</span>
        </div>
        <div class="news__body">
          <div class="news__meta">
            <span>{{ item.date | date:'mediumDate' }}</span>
            <span>{{ item.author }}</span>
          </div>
          <h3>{{ item.title }}</h3>
          <p>{{ item.excerpt }}</p>
          <a class="news__link">
            Read More
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
