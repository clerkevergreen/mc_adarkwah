<nav class="navbar" [class.navbar--scrolled]="isScrolled">
  <div class="navbar__container">
    <a class="navbar__logo" routerLink="/" (click)="scrollToSection('hero')">
      <span class="navbar__logo-icon">✦</span>
      <span class="navbar__logo-text">MC <span class="text-gold">Adarkwah</span></span>
    </a>

    <div class="navbar__menu" [class.navbar__menu--open]="isMobileMenuOpen">
      <ul class="navbar__links">
        <li class="navbar__item" *ngFor="let item of navItems">
          <a class="navbar__link" (click)="scrollToSection(item.fragment)">
            <span class="navbar__link-label">{{ item.label }}</span>
          </a>
        </li>
      </ul>
      <div class="navbar__cta-mobile">
        <div class="navbar__currency navbar__currency--mobile">
          <button class="navbar__currency-btn" [class.active]="currency === 'GHS'" (click)="currencyService.setCurrency('GHS')">₵ GHS</button>
          <button class="navbar__currency-btn" [class.active]="currency === 'USD'" (click)="currencyService.setCurrency('USD')">$ USD</button>
        </div>
        <a class="navbar__portal-link navbar__portal-link--mobile" routerLink="/portal" (click)="closeMobileMenu()">Client Portal</a>
        <a class="btn btn--gold" (click)="scrollToSection('booking')">Book Now</a>
      </div>
    </div>

    <div class="navbar__actions">
      <div class="navbar__currency">
        <button class="navbar__currency-btn" [class.active]="currency === 'GHS'" (click)="currencyService.setCurrency('GHS')">₵</button>
        <button class="navbar__currency-btn" [class.active]="currency === 'USD'" (click)="currencyService.setCurrency('USD')">$</button>
      </div>
      <a class="navbar__portal-link" routerLink="/portal">Portal</a>
      <a class="btn btn--gold btn--sm navbar__cta" (click)="scrollToSection('booking')">Book Now</a>
      <button class="navbar__hamburger" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen"
        aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <div class="navbar__overlay" [class.navbar__overlay--visible]="isMobileMenuOpen"
      (click)="closeMobileMenu()"></div>
  </div>
</nav>
