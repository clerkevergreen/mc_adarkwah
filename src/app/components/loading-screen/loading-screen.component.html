<div class="loading-screen" [class.loading-screen--hidden]="!isLoading">
  <div class="loading-screen__content">
    <div class="loading-screen__logo">
      <span class="loading-screen__icon">✦</span>
    </div>
    <h1 class="loading-screen__title">MC <span class="text-gold">Adarkwah</span></h1>
    <p class="loading-screen__subtitle">Professional Master of Ceremonies</p>
    <div class="loading-screen__bar">
      <div class="loading-screen__bar-fill"></div>
    </div>
  </div>
  <div class="loading-screen__particles">
    <span *ngFor="let _ of [].constructor(20); let i = index" class="loading-screen__particle"
      [style.--i]="i" [style.animation-delay]="i * 0.1 + 's'"></span>
  </div>
</div>
