<aside
  class="app-sidebar"
  [class.app-sidebar--collapsed]="isCollapsed"
  [class.app-sidebar--mobile-open]="isMobileOpen"
>
  <div class="app-sidebar__header">
    <div class="app-sidebar__logo">
      <svg class="app-sidebar__logo-icon" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span class="app-sidebar__logo-text" [class.app-sidebar__logo-text--hidden]="isCollapsed">MC Adarkwah</span>
    </div>
    @if (!isCollapsed) {
      <span class="app-sidebar__badge">Admin</span>
    }
  </div>

  <nav class="app-sidebar__nav">
    @for (item of navItems; track item.route) {
      <a
        class="app-sidebar__link"
        [class.app-sidebar__link--active]="router.isActive(item.route, true)"
        [routerLink]="item.route"
        (click)="closeMobile()"
        routerLinkActive="app-sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        <svg class="app-sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path [attr.d]="getIcon(item.icon)" />
        </svg>
        @if (!isCollapsed) {
          <span class="app-sidebar__label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <div class="app-sidebar__footer">
    <button class="app-sidebar__logout" (click)="logout()">
      <svg class="app-sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path [attr.d]="getIcon('log-out')" />
      </svg>
      @if (!isCollapsed) {
        <span class="app-sidebar__label">Logout</span>
      }
    </button>
  </div>
</aside>

@if (isMobileOpen) {
  <div class="app-sidebar__backdrop" (click)="closeMobile()"></div>
}
