<div class="app-stats-card">
  <div class="app-stats-card__header">
    <div class="app-stats-card__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path [attr.d]="getIcon(iconName)" />
      </svg>
    </div>
    <span class="app-stats-card__label">{{ label }}</span>
  </div>

  <div class="app-stats-card__body">
    <span class="app-stats-card__value">{{ value }}</span>

    @if (trend !== null) {
      <span
        class="app-stats-card__trend"
        [class.app-stats-card__trend--up]="trendDirection === 'up'"
        [class.app-stats-card__trend--down]="trendDirection === 'down'"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          @if (trendDirection === 'up') {
            <path d="M18 15l-6-6-6 6"/>
          } @else {
            <path d="M6 9l6 6 6-6"/>
          }
        </svg>
        {{ trend }}%
      </span>
    }
  </div>

  <ng-content select="[slot=chart]"></ng-content>
</div>
