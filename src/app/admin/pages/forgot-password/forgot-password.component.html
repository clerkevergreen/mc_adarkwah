<div class="forgot">
  <div class="forgot__overlay"></div>
  <div class="forgot__card">
    <div class="forgot__brand">
      <span class="forgot__logo-icon">✦</span>
      <h1 class="forgot__title">MC Adarkwah</h1>
      <p class="forgot__subtitle">Forgot Password</p>
    </div>

    <ng-container *ngIf="!sent; else successMessage">
      <p class="forgot__info">Enter your email and we'll send you a reset link.</p>
      <form class="forgot__form" (ngSubmit)="onSubmit()" #forgotForm="ngForm">
        <div class="forgot__field">
          <label class="forgot__label" for="email">Email</label>
          <input id="email" class="forgot__input" type="email" placeholder="admin@example.com" [(ngModel)]="email" name="email" required />
        </div>
        <div class="forgot__error" *ngIf="error">{{ error }}</div>
        <button class="forgot__btn" type="submit" [disabled]="loading">
          <span *ngIf="!loading">Send Reset Link</span>
          <span *ngIf="loading">Sending...</span>
        </button>
        <a routerLink="/admin/login" class="forgot__back">Back to Login</a>
      </form>
    </ng-container>

    <ng-template #successMessage>
      <div class="forgot__success">
        <div class="forgot__success-icon">✓</div>
        <h3>Reset Link Created</h3>
        <p *ngIf="!resetUrl">If an account exists with that email, we've sent a password reset link.</p>
        <div *ngIf="resetUrl" class="forgot__link">
          <p>Click the link below to reset your password:</p>
          <a [href]="resetUrl" class="forgot__reset-link">{{ resetUrl }}</a>
        </div>
        <a routerLink="/admin/login" class="forgot__back">Back to Login</a>
      </div>
    </ng-template>
  </div>
</div>
