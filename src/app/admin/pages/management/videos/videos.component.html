<div class="layout">
  <app-sidebar></app-sidebar>
  <div class="layout__main">
    <app-topbar pageTitle="Video Highlights"></app-topbar>
    <div class="content">
      <div class="toolbar">
        <button class="btn btn--gold btn--sm" (click)="openCreate()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Video
        </button>
      </div>
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr><th>Title</th><th>URL</th><th>Order</th><th>Active</th><th>Actions</th></tr>
          </thead>
          <tbody>
            @if (items.length === 0) {
              <tr><td colspan="5" class="table__empty">No videos found</td></tr>
            }
            @for (item of items; track item.id) {
              <tr>
                <td><strong>{{ item.title }}</strong></td>
                <td class="table__review">{{ item.url }}</td>
                <td>{{ item.order }}</td>
                <td>
                  <label class="toggle" (click)="$event.stopPropagation()">
                    <input type="checkbox" [checked]="item.isActive" (change)="toggleActive(item)" />
                    <span class="toggle__slider" [class.toggle__slider--on]="item.isActive"></span>
                  </label>
                </td>
                <td>
                  <div class="actions">
                    <button class="actions__btn" title="Edit" (click)="openEdit(item)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                    <button class="actions__btn actions__btn--danger" title="Delete" (click)="confirmDelete(item.id)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

@if (showFormModal) {
  <app-modal [title]="isEdit ? 'Edit Video' : 'Add Video'" size="md" (close)="closeForm()">
    <div class="form">
      <div class="form__group">
        <label class="form__label">Title</label>
        <input class="form__input" type="text" [(ngModel)]="form.title" />
      </div>
      <div class="form__group">
        <label class="form__label">Video URL</label>
        <input class="form__input" type="text" [(ngModel)]="form.url" />
      </div>
      <div class="form__group">
        <label class="form__label">Thumbnail URL</label>
        <input class="form__input" type="text" [(ngModel)]="form.thumbnail" />
      </div>
      <div class="form__group">
        <label class="form__label">Order</label>
        <input class="form__input" type="number" [(ngModel)]="form.order" />
      </div>
    </div>
    <div slot="footer">
      <button class="btn btn--outline btn--sm" (click)="closeForm()">Cancel</button>
      <button class="btn btn--gold btn--sm" (click)="saveItem()">{{ isEdit ? 'Update' : 'Create' }}</button>
    </div>
  </app-modal>
}

@if (showConfirm) {
  <app-confirm-dialog
    title="Delete Video"
    message="Are you sure you want to delete this video?"
    (confirm)="deleteItem()"
    (cancel)="cancelDelete()"
  ></app-confirm-dialog>
}
