<div class="layout">
  <app-sidebar></app-sidebar>
  <div class="layout__main">
    <app-topbar pageTitle="Hero Section"></app-topbar>
    <div class="content">
      <div class="toolbar">
        <button class="btn btn--gold btn--sm" (click)="save()">Save Changes</button>
      </div>
      <div class="card" style="padding:1.5rem;margin-top:1rem;">
        <div class="form">
          <div class="form__group">
            <label class="form__label">Badge Text</label>
            <input class="form__input" type="text" [(ngModel)]="form.badge" />
          </div>
          <div class="form__group">
            <label class="form__label">Title</label>
            <input class="form__input" type="text" [(ngModel)]="form.title" />
          </div>
          <div class="form__group">
            <label class="form__label">Subtitle</label>
            <input class="form__input" type="text" [(ngModel)]="form.subtitle" />
          </div>
          <div class="form__row">
            <div class="form__group">
              <label class="form__label">Primary Button Text</label>
              <input class="form__input" type="text" [(ngModel)]="form.primaryBtnText" />
            </div>
            <div class="form__group">
              <label class="form__label">Scroll To Section</label>
              <input class="form__input" type="text" [(ngModel)]="form.primaryBtnAction" />
            </div>
          </div>
          <div class="form__row">
            <div class="form__group">
              <label class="form__label">Secondary Button Text</label>
              <input class="form__input" type="text" [(ngModel)]="form.secondaryBtnText" />
            </div>
            <div class="form__group">
              <label class="form__label">Scroll To Section</label>
              <input class="form__input" type="text" [(ngModel)]="form.secondaryBtnAction" />
            </div>
          </div>
          <h3 style="color:#d4a84b;margin:1.5rem 0 1rem;">Floating Stat 1</h3>
          <div class="form__row">
            <div class="form__group"><label class="form__label">Value</label><input class="form__input" type="text" [(ngModel)]="form.stat1Value" /></div>
            <div class="form__group"><label class="form__label">Label</label><input class="form__input" type="text" [(ngModel)]="form.stat1Label" /></div>
            <div class="form__group"><label class="form__label">Icon</label><input class="form__input" type="text" [(ngModel)]="form.stat1Icon" /></div>
          </div>
          <h3 style="color:#d4a84b;margin:1.5rem 0 1rem;">Floating Stat 2</h3>
          <div class="form__row">
            <div class="form__group"><label class="form__label">Value</label><input class="form__input" type="text" [(ngModel)]="form.stat2Value" /></div>
            <div class="form__group"><label class="form__label">Label</label><input class="form__input" type="text" [(ngModel)]="form.stat2Label" /></div>
            <div class="form__group"><label class="form__label">Icon</label><input class="form__input" type="text" [(ngModel)]="form.stat2Icon" /></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
