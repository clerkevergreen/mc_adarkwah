<div class="layout">
  <app-sidebar (toggle)="sidebarCollapsed = !sidebarCollapsed"></app-sidebar>
  @if (sidebarCollapsed) {
    <div class="layout__sidebar-backdrop" (click)="sidebarCollapsed = false"></div>
  }

  <div class="layout__main">
    <app-topbar pageTitle="Events"></app-topbar>

    <div class="layout__content">
      <div class="page">
        <div class="page__toolbar">
          <div class="page__filters">
            <div class="page__search">
              <svg class="page__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input
                class="page__input"
                type="text"
                placeholder="Search events..."
                [(ngModel)]="search"
              />
            </div>

            <select class="page__select" [(ngModel)]="selectedCategory">
              <option value="">All Categories</option>
              @for (cat of categories; track cat) {
                <option [value]="cat">{{ cat | titlecase }}</option>
              }
            </select>
          </div>

          <div class="page__chips">
            <button
              class="page__chip"
              [class.page__chip--active]="statusFilter === 'all'"
              (click)="statusFilter = 'all'"
            >All</button>
            <button
              class="page__chip"
              [class.page__chip--active]="statusFilter === 'upcoming'"
              (click)="statusFilter = 'upcoming'"
            >Upcoming</button>
            <button
              class="page__chip"
              [class.page__chip--active]="statusFilter === 'featured'"
              (click)="statusFilter = 'featured'"
            >Featured</button>
          </div>
        </div>

        <div class="page__header-actions">
          <button class="page__btn-primary" (click)="openCreateModal()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New Event
          </button>
        </div>

        <app-data-table
          [columns]="columns"
          [rows]="filteredEvents"
          [loading]="loading"
          (edit)="onEdit($event)"
          (delete)="onDelete($event)"
          (statusChange)="onToggleFeature($event)"
          (view)="onView($event)"
        ></app-data-table>
      </div>
    </div>
  </div>
</div>

@if (showModal) {
  <app-modal
    [title]="editingEvent ? 'Edit Event' : 'Create Event'"
    size="lg"
    (close)="closeModal()"
  >
    <form class="form" #eventForm="ngForm">
      <div class="form__grid">
        <div class="form__field form__field--full">
          <label class="form__label">Title</label>
          <input class="form__input" type="text" [(ngModel)]="formData.title" name="title" required />
        </div>

        <div class="form__field">
          <label class="form__label">Category</label>
          <select class="form__select" [(ngModel)]="formData.category" name="category">
            <option value="" disabled>Select category</option>
            @for (cat of categories; track cat) {
              <option [value]="cat">{{ cat | titlecase }}</option>
            }
          </select>
        </div>

        <div class="form__field">
          <label class="form__label">Date</label>
          <input class="form__input" type="date" [ngModel]="eventDateStr" (ngModelChange)="eventDateStr = $event" name="date" />
        </div>

        <div class="form__field form__field--full">
          <label class="form__label">Short Description</label>
          <input class="form__input" type="text" [(ngModel)]="formData.shortDescription" name="shortDescription" />
        </div>

        <div class="form__field form__field--full">
          <label class="form__label">Description</label>
          <textarea class="form__textarea" rows="4" [(ngModel)]="formData.description" name="description"></textarea>
        </div>

        <div class="form__field">
          <label class="form__label">Venue</label>
          <input class="form__input" type="text" [(ngModel)]="formData.venue" name="venue" />
        </div>

        <div class="form__field">
          <label class="form__label">Location</label>
          <input class="form__input" type="text" [(ngModel)]="formData.location" name="location" />
        </div>

        <div class="form__field">
          <label class="form__label">City</label>
          <input class="form__input" type="text" [(ngModel)]="formData.city" name="city" />
        </div>

        <div class="form__field">
          <label class="form__label">Country</label>
          <input class="form__input" type="text" [(ngModel)]="formData.country" name="country" />
        </div>

        <div class="form__field">
          <label class="form__label">Attendee Count</label>
          <input class="form__input" type="number" [(ngModel)]="formData.attendeeCount" name="attendeeCount" />
        </div>

        <div class="form__field form__field--full">
          <label class="form__label">Banner Image</label>
          <input class="form__input" type="file" accept="image/*" (change)="onBannerSelected($event)" />
          <div class="form__image-preview" *ngIf="bannerPreview">
            <img [src]="bannerPreview" alt="Banner preview" />
            <span class="form__image-name" *ngIf="bannerFile">{{ bannerFile.name }}</span>
          </div>
          <span class="form__uploading" *ngIf="uploadingBanner">Uploading banner image...</span>
        </div>

        <div class="form__field form__field--full">
          <label class="form__label">Thumbnail Image</label>
          <input class="form__input" type="file" accept="image/*" (change)="onThumbnailSelected($event)" />
          <div class="form__image-preview" *ngIf="thumbnailPreview">
            <img [src]="thumbnailPreview" alt="Thumbnail preview" />
            <span class="form__image-name" *ngIf="thumbnailFile">{{ thumbnailFile.name }}</span>
          </div>
          <span class="form__uploading" *ngIf="uploadingThumbnail">Uploading thumbnail image...</span>
        </div>

        <div class="form__field form__field--full">
          <label class="form__label">Highlights (comma-separated)</label>
          <input class="form__input" type="text" [ngModel]="highlightsStr" (ngModelChange)="highlightsStr = $event" name="highlights" />
        </div>

        <div class="form__field form__field--full">
          <label class="form__label">Tags (comma-separated)</label>
          <input class="form__input" type="text" [ngModel]="tagsStr" (ngModelChange)="tagsStr = $event" name="tags" />
        </div>

        <div class="form__field form__field--full">
          <label class="form__label">Registration URL</label>
          <input class="form__input" type="url" placeholder="https://forms.google.com/..." [(ngModel)]="formData.registrationUrl" name="registrationUrl" />
        </div>

        <div class="form__field form__field--full">
          <label class="form__label">Ticket URL</label>
          <input class="form__input" type="url" placeholder="https://eventbrite.com/..." [(ngModel)]="formData.ticketUrl" name="ticketUrl" />
        </div>

        <div class="form__field form__checkbox">
          <label class="form__checkbox-label">
            <input type="checkbox" [(ngModel)]="formData.isUpcoming" name="isUpcoming" />
            <span class="form__checkmark"></span>
            Is Upcoming
          </label>
        </div>

        <div class="form__field form__checkbox">
          <label class="form__checkbox-label">
            <input type="checkbox" [(ngModel)]="formData.isFeatured" name="isFeatured" />
            <span class="form__checkmark"></span>
            Is Featured
          </label>
        </div>
      </div>
    </form>

    <div slot="footer">
      <button class="form__btn form__btn--cancel" (click)="closeModal()">Cancel</button>
      <button class="form__btn form__btn--save" (click)="saveEvent()" [disabled]="saving">
        @if (saving) {
          <span class="form__spinner"></span>
        }
        {{ editingEvent ? 'Update' : 'Create' }}
      </button>
    </div>
  </app-modal>
}

@if (showDeleteConfirm) {
  <app-confirm-dialog
    title="Delete Event"
    [message]="'Are you sure you want to delete \'' + (deletingEvent?.title || '') + '\'?'"
    (confirm)="confirmDelete()"
    (cancel)="cancelDelete()"
  ></app-confirm-dialog>
}
