<div class="signup">
  <div class="signup__overlay"></div>
  <div class="signup__card">
    <div class="signup__brand">
      <span class="signup__logo-icon">✦</span>
      <h1 class="signup__title">MC Adarkwah</h1>
      <p class="signup__subtitle">Create Admin Account</p>
    </div>
    <div *ngIf="success" class="signup__success">
      <p>Admin account created successfully!</p>
      <a routerLink="/admin/dashboard" class="signup__btn signup__btn--success">Go to Dashboard</a>
    </div>
    <form *ngIf="!success" class="signup__form" (ngSubmit)="onSubmit()" #signupForm="ngForm">
      <div class="signup__field">
        <label class="signup__label" for="name">Name</label>
        <input id="name" class="signup__input" type="text" placeholder="Admin name" [(ngModel)]="name" name="name" required />
      </div>
      <div class="signup__field">
        <label class="signup__label" for="email">Email</label>
        <input id="email" class="signup__input" type="email" placeholder="admin@example.com" [(ngModel)]="email" name="email" required />
      </div>
      <div class="signup__field">
        <label class="signup__label" for="password">Password</label>
        <div class="password-wrap">
          <input id="password" class="signup__input password-input" [type]="showPassword ? 'text' : 'password'" placeholder="Min. 6 characters" [(ngModel)]="password" name="password" required />
          <button type="button" class="eye-btn" (click)="showPassword = !showPassword" tabindex="-1">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="signup__field">
        <label class="signup__label" for="confirmPassword">Confirm Password</label>
        <div class="password-wrap">
          <input id="confirmPassword" class="signup__input password-input" [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Repeat password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
          <button type="button" class="eye-btn" (click)="showConfirmPassword = !showConfirmPassword" tabindex="-1">
            <svg *ngIf="!showConfirmPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showConfirmPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="signup__error" *ngIf="error">{{ error }}</div>
      <button class="signup__btn" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Create Admin Account</span>
        <span *ngIf="loading">
          <span class="signup__spinner"></span>
          Creating...
        </span>
      </button>
    </form>
    <div class="signup__footer">
      <a routerLink="/admin/dashboard">Back to Dashboard</a>
    </div>
  </div>
</div>
