<div class="login">
  <div class="login__overlay"></div>
  <div class="login__card">
    <div class="login__brand">
      <span class="login__logo-icon">✦</span>
      <h1 class="login__title">MC Adarkwah</h1>
      <p class="login__subtitle">Admin Dashboard</p>
    </div>
    <form class="login__form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="login__field">
        <label class="login__label" for="email">Email</label>
        <input
          id="email"
          class="login__input"
          type="email"
          placeholder="admin@example.com"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          required
        />
      </div>
      <div class="login__field">
        <label class="login__label" for="password">Password</label>
        <div class="password-wrap">
          <input
            id="password"
            class="login__input password-input"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="eye-btn" (click)="showPassword = !showPassword" tabindex="-1">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="login__links">
        <a routerLink="/admin/forgot-password" class="login__forgot">Forgot password?</a>
      </div>
      <div class="login__error" *ngIf="error">
        {{ error }}
      </div>
      <button
        class="login__btn"
        type="submit"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading">
          <span class="login__spinner"></span>
          Logging in...
        </span>
      </button>
    </form>
  </div>
</div>
